<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox MCP — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/languages/lua.min.js" defer></script>
</head>
<body>
    <!-- ─── Top navbar ────────────────────────────────────-->
    <nav class="topbar">
        <div class="topbar-left">
            <div class="topbar-client-selector" id="clientSelectorBtn">
                <div class="client-selector-avatar" id="clientSelectorAvatar">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
                </div>
                <span class="client-selector-name" id="clientSelectorName">Select Client</span>
                <svg class="client-selector-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
            </div>
        </div>
        <div class="topbar-center">
            <button class="topbar-back" id="topbarBack" style="display:none" title="Back"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg></button>
            <span class="topbar-section" id="topbarSection">Clients</span>
        </div>
        <div class="topbar-right"></div>
    </nav>

    <!-- ─── Client selector dropdown 一──────────────────────────────────────────────-->
    <div class="client-dropdown" id="clientDropdown">
        <div class="client-dropdown-search-wrap">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
            <input type="text" class="client-dropdown-search" id="clientDropdownSearch" placeholder="Find Client..." autocomplete="off">
        </div>
        <div class="client-dropdown-list" id="clientDropdownList">
            <div class="client-dropdown-empty">No clients connected</div>
        </div>
    </div>
<!-- Hidden elements kept for JS compatibility -->
<div id="topbarStatus" style="display:none"><div class="status-dot"></div><span></span></div>
<div id="topbarRole" style="display:none"></div>
